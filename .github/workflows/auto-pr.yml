name: Auto-open PR

# 브랜치를 "type/#이슈번호"(예: feat/#34) 규칙으로 push하면 PR을 자동으로 연다.
# 이 규칙을 따르지 않는 브랜치명(예: refactor/tts-change-and-table-rendering)은
# 이슈 번호를 알 수 없으므로 건너뛰고, 기존처럼 수동으로 PR을 생성한다.
on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse branch name
        id: parse
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^([a-zA-Z]+)/#?([0-9]+)$ ]]; then
            echo "type=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "issue=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (branch name has no issue number)
        if: steps.parse.outputs.matched != 'true'
        run: echo "브랜치명이 'type/#이슈번호' 형식이 아니라 자동 PR 생성을 건너뜁니다."

      # PR 라벨은 저장소에 이미 있는 라벨만 사용한다(존재하지 않는 라벨을 붙이려 하면 gh pr create가 실패함).
      - name: Map branch type to an existing label
        id: label
        if: steps.parse.outputs.matched == 'true'
        env:
          TYPE: ${{ steps.parse.outputs.type }}
        run: |
          case "$TYPE" in
            feat) LABEL="feat" ;;
            fix|hotfix) LABEL="bug" ;;
            docs) LABEL="documentation" ;;
            refactor|perf|chore) LABEL="enhancement" ;;
            *) LABEL="" ;;
          esac
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      # 같은 브랜치에 여러 번 push해도 PR이 중복 생성되지 않도록 먼저 존재 여부를 확인한다.
      - name: Check for existing PR
        id: existing
        if: steps.parse.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          COUNT=$(gh pr list --head "$BRANCH_NAME" --state all --json number --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      # 저장소의 PULL_REQUEST_TEMPLATE.md 구조를 그대로 따르되, "작업 내용"은
      # main과 갈라진 이후의 커밋 목록으로 채운다 — 요약이 아니라 초안이므로 PR에서 다듬어야 한다.
      - name: Build PR body
        id: body
        if: steps.parse.outputs.matched == 'true' && steps.existing.outputs.count == '0'
        env:
          ISSUE: ${{ steps.parse.outputs.issue }}
        run: |
          COMMITS=$(git log origin/main..HEAD --pretty=format:'- %s')
          {
            echo "## #️⃣연관된 이슈"
            echo ""
            echo "- closes #$ISSUE"
            echo ""
            echo "## 📝작업 내용"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "### 스크린샷 (선택)"
            echo ""
            echo "## 💬고민하고 있는 부분(선택)"
            echo ""
            echo "> 커밋 목록으로 자동 생성된 초안입니다. 리뷰 전에 작업 내용을 다듬어주세요."
          } > pr_body.md

      - name: Create PR
        if: steps.parse.outputs.matched == 'true' && steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          LABEL: ${{ steps.label.outputs.label }}
        run: |
          TITLE=$(git log -1 --pretty=%s)
          ARGS=(--base main --head "$BRANCH_NAME" --title "$TITLE" --body-file pr_body.md --assignee "${{ github.actor }}")
          if [ -n "$LABEL" ]; then
            ARGS+=(--label "$LABEL")
          fi
          gh pr create "${ARGS[@]}"
